stages:
  - publish

# Publishes packages/skill/ to github.com/sinister/preflight on every semver tag.
# Requires GITHUB_TOKEN to be set as a masked CI/CD variable in GitLab project settings.
publish-skill:
  stage: publish
  image: alpine:3.19
  before_script:
    - apk add --no-cache git bash
    - git config --global user.name "CI Publisher"
    - git config --global user.email "ci@noreply.github.com"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  variables:
    GIT_DEPTH: 0
  script:
    - bash scripts/publish-skill.sh
